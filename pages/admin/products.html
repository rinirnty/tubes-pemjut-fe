<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kelola Produk — PanenKu Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ── ADMIN SHARED STYLES ── */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

:root {
  --cream:   #F7F2E8;
  --cream2:  #EDE4CF;
  --brown:   #5C3D1E;
  --brown2:  #8B6340;
  --brown3:  #C4956A;
  --green:   #4A7C3F;
  --green2:  #6FA05E;
  --green3:  #C9DFB5;
  --gold:    #C8962A;
  --gold2:   #F0C55A;
  --text:    #2C1F0E;
  --muted:   #7A6040;
  --red:     #C0392B;
  --red2:    #FDECEA;
  --blue:    #2471A3;
  --blue2:   #D6EAF8;
  --sidebar-w: 240px;
  --header-h:  64px;
  --border: rgba(92,61,30,.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; display: flex; overflow-x: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w); min-height: 100vh;
  background: var(--brown);
  display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; bottom: 0;
  z-index: 200; transition: transform .3s;
}
.sidebar-logo {
  padding: 1.5rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; gap: .6rem;
}
.sidebar-logo a {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem; font-weight: 700; color: #fff;
  text-decoration: none; display: flex; align-items: center; gap: .4rem;
}
.sidebar-logo span { color: var(--gold2); }
.sidebar-role {
  font-size: .68rem; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: rgba(255,255,255,.45);
  padding: 1rem 1.25rem .5rem;
}
.sidebar-nav { flex: 1; padding: .5rem 0; }
.nav-item {
  display: flex; align-items: center; gap: .75rem;
  padding: .7rem 1.25rem; text-decoration: none;
  color: rgba(255,255,255,.65); font-size: .88rem; font-weight: 500;
  transition: all .2s; position: relative; border-radius: 0;
  margin: .1rem .75rem; border-radius: 10px;
}
.nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,.15); color: #fff; }
.nav-item.active::before {
  content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 60%; background: var(--gold2); border-radius: 99px;
}
.nav-icon { font-size: 1.1rem; width: 20px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: var(--gold); color: #fff;
  font-size: .65rem; font-weight: 700; padding: .15rem .45rem;
  border-radius: 999px;
}
.sidebar-divider { height: 1px; background: rgba(255,255,255,.08); margin: .5rem 1rem; }
.sidebar-footer {
  padding: 1rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,.08);
}
.admin-profile {
  display: flex; align-items: center; gap: .75rem;
}
.admin-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--gold); display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
}
.admin-name { font-size: .82rem; font-weight: 600; color: #fff; }
.admin-email { font-size: .7rem; color: rgba(255,255,255,.45); }
.btn-logout {
  margin-left: auto; background: none; border: none;
  color: rgba(255,255,255,.45); cursor: pointer; font-size: 1rem;
  transition: color .2s;
}
.btn-logout:hover { color: var(--red); }

/* ── MAIN AREA ── */
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── TOPBAR ── */
.topbar {
  height: var(--header-h); background: rgba(247,242,232,.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; position: sticky; top: 0; z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 1rem; }
.page-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--text); }
.breadcrumb { font-size: .78rem; color: var(--muted); }
.topbar-right { display: flex; align-items: center; gap: .75rem; }
.topbar-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: #fff; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; transition: all .2s; position: relative;
}
.topbar-btn:hover { background: var(--cream2); border-color: var(--brown2); }
.notif-dot {
  position: absolute; top: 6px; right: 6px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red); border: 1.5px solid var(--cream);
}

/* ── PAGE CONTENT ── */
.page-content { padding: 1.75rem 2rem; flex: 1; }

/* ── CARDS ── */
.stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.25rem; margin-bottom: 1.75rem; }
.stat-card {
  background: #fff; border-radius: 16px; padding: 1.25rem 1.5rem;
  border: 1px solid var(--border); display: flex; align-items: flex-start;
  gap: 1rem; transition: transform .2s, box-shadow .2s;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(92,61,30,.1); }
.stat-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0;
}
.stat-value { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--text); line-height: 1; }
.stat-label { font-size: .78rem; color: var(--muted); margin-top: .25rem; }
.stat-change { font-size: .75rem; margin-top: .4rem; display: flex; align-items: center; gap: .25rem; }
.stat-change.up { color: var(--green); }
.stat-change.down { color: var(--red); }

/* ── TABLE ── */
.table-wrap {
  background: #fff; border-radius: 16px;
  border: 1px solid var(--border); overflow: hidden;
}
.table-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: .75rem;
}
.table-title { font-weight: 600; font-size: .95rem; color: var(--text); }
.table-actions { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
.search-box {
  display: flex; align-items: center; gap: .5rem;
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 10px; padding: .45rem .85rem;
}
.search-box input {
  border: none; background: transparent; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: .85rem;
  color: var(--text); width: 180px;
}
.search-box input::placeholder { color: var(--muted); }

table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--cream); }
th { padding: .75rem 1.25rem; text-align: left; font-size: .75rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
td { padding: .85rem 1.25rem; border-top: 1px solid var(--border); font-size: .875rem; color: var(--text); vertical-align: middle; }
tr:hover td { background: rgba(247,242,232,.6); }

/* ── BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .25rem .7rem; border-radius: 999px;
  font-size: .72rem; font-weight: 600;
}
.badge-green  { background: #EAF6EA; color: var(--green); }
.badge-gold   { background: #FEF9E7; color: var(--gold); }
.badge-red    { background: var(--red2); color: var(--red); }
.badge-blue   { background: var(--blue2); color: var(--blue); }
.badge-gray   { background: var(--cream2); color: var(--muted); }
.badge-brown  { background: #F5EDE0; color: var(--brown); }

/* ── BUTTONS ── */
.btn { padding: .5rem 1.1rem; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: .845rem; font-weight: 500; cursor: pointer; transition: all .2s; border: none; text-decoration: none; display: inline-flex; align-items: center; gap: .4rem; }
.btn-primary { background: var(--brown); color: #fff; }
.btn-primary:hover { background: var(--green); transform: translateY(-1px); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: var(--brown); }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--cream2); border-color: var(--brown2); }
.btn-red { background: var(--red2); color: var(--red); }
.btn-red:hover { background: var(--red); color: #fff; }
.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:hover { background: var(--brown); }
.btn-sm { padding: .35rem .75rem; font-size: .78rem; border-radius: 8px; }
.btn-icon { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(44,31,14,.5);
  backdrop-filter: blur(4px); z-index: 500;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: #fff; border-radius: 20px; width: 90%; max-width: 520px;
  padding: 2rem; max-height: 90vh; overflow-y: auto;
  transform: translateY(20px); transition: transform .25s;
}
.modal-overlay.show .modal { transform: none; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--text); }
.modal-close { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--muted); transition: color .2s; }
.modal-close:hover { color: var(--red); }
.form-field { margin-bottom: 1.1rem; }
.form-field label { display: block; font-size: .8rem; font-weight: 500; color: var(--brown); margin-bottom: .4rem; }
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: .65rem .9rem; border: 1.5px solid var(--border);
  border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: .875rem;
  color: var(--text); background: #fff; outline: none; transition: border-color .2s;
}
.form-field textarea { resize: vertical; min-height: 80px; }
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--green); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
.modal-footer { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

/* ── MISC ── */
.section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 1rem; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.25rem; }
.card { background: #fff; border-radius: 16px; padding: 1.5rem; border: 1px solid var(--border); }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.empty-state .es-icon { font-size: 3rem; margin-bottom: 1rem; }
.empty-state p { font-size: .9rem; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 600; flex-shrink: 0; }
.pagination { display: flex; align-items: center; gap: .5rem; padding: 1rem 1.5rem; border-top: 1px solid var(--border); }
.pg-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .82rem; color: var(--text); transition: all .2s; }
.pg-btn:hover, .pg-btn.active { background: var(--brown); color: #fff; border-color: var(--brown); }
.pg-info { font-size: .78rem; color: var(--muted); margin-left: auto; }
.filter-bar { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
.filter-btn { padding: .4rem .9rem; border-radius: 999px; border: 1.5px solid var(--border); background: #fff; font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .2s; }
.filter-btn:hover, .filter-btn.active { background: var(--brown); color: #fff; border-color: var(--brown); }
.reveal { opacity: 0; transform: translateY(16px); transition: opacity .5s ease, transform .5s ease; }
.reveal.visible { opacity: 1; transform: none; }

</style>
  <style>

    .prod-thumb { height:140px; display:flex; align-items:center; justify-content:center; font-size:4.5rem; position:relative; }
    .prod-stock-badge { position:absolute; top:10px; right:10px; font-size:.68rem; font-weight:700; padding:.2rem .6rem; border-radius:999px; }
    .prod-body { padding:1rem 1.1rem; }
    .prod-cat { font-size:.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--green2); margin-bottom:.25rem; }
    .prod-name { font-weight:600; font-size:.92rem; margin-bottom:.2rem; }
    .prod-footer { display:flex; align-items:center; justify-content:space-between; }

    .prod-actions { display:flex; gap:.35rem; }

    .vt-btn { width:34px; height:34px; border-radius:8px; border:1px solid var(--border); background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.9rem; transition:all .2s; }
    .vt-btn.active { background:var(--brown); color:#fff; border-color:var(--brown); }
  </style>
</head>
<body>

  <div class="sidebar-logo"><a href="../../../index.html">🌾 Panen<span>Ku</span></a></div>
  <div class="sidebar-role">Admin Panel</div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>

      <div class="stat-card"><div class="stat-icon" style="background:#FFF8E0">✅</div><div><div class="stat-value">48</div><div class="stat-label">Aktif</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#FDECEA">⚠️</div><div><div class="stat-value">4</div><div class="stat-label">Stok Menipis</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:#F5EDE0">📂</div><div><div class="stat-value">5</div><div class="stat-label">Kategori</div></div></div>

    <!-- Filter & Search -->

        <button class="filter-btn" onclick="filterKat('Ubi Jalar',this)">🍠 Ubi Jalar</button>

<script>
const allProducts = [
  {emoji:'🍚',cat:'Beras Putih',name:'Beras Pandan Wangi',var:'Premium • Pulen',mitra:'Mitra Pak Hendra',price:'Rp 65.000',unit:'/5 kg',stock:120,bg:'#FFF8E8',status:'aktif'}
];

let currentKat = 'semua';
let currentView = 'grid';

function filterKat(kat, btn) {
  currentKat = kat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const c = document.getElementById('prod-container');
  c.className = v === 'grid' ? 'prod-grid reveal visible' : 'table-wrap reveal visible';
  renderProducts();
}

function renderProducts() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allProducts.filter(p =>
    (currentKat === 'semua' || p.cat === currentKat) &&
    p.name.toLowerCase().includes(q)
  );
  const c = document.getElementById('prod-container');
  if (currentView === 'grid') {
    c.innerHTML = filtered.map((p,i) => `
      <div class="prod-card">
        <div class="prod-thumb" style="background:${p.bg}">
          ${p.emoji}
          <span class="prod-stock-badge ${p.status==='aktif'?'badge-green':p.status==='stok menipis'?'badge-gold':'badge-red'}">${p.status}</span>
        </div>
        <div class="prod-body">
          <div class="prod-cat">${p.cat}</div>
          <div class="prod-name">${p.name}</div>

          <div class="prod-footer">
            <div><div class="prod-price">${p.price}</div><div class="prod-unit">${p.unit}</div></div>
            <div class="prod-actions">
              <button class="btn btn-outline btn-icon btn-sm" onclick="editProduct(${i})" title="Edit">✏️</button>
              <button class="btn btn-red btn-icon btn-sm" onclick="deleteProduct(this)" title="Hapus">🗑️</button>
            </div>
          </div>
        </div>
      </div>`).join('');
  } else {
    c.innerHTML = `
      <div class="table-header"><div class="table-title">Daftar Produk</div></div>
      <table><thead><tr><th>Produk</th><th>Kategori</th><th>Harga</th><th>Stok</th><th>Mitra</th><th>Status</th><th>Aksi</th></tr></thead>
      <tbody>${filtered.map((p,i) => `<tr>
        <td><div style="display:flex;align-items:center;gap:.6rem"><span style="font-size:1.5rem">${p.emoji}</span>${p.name}</div></td>
        <td>${p.cat}</td>
        <td style="font-weight:600">${p.price}${p.unit}</td>
        <td>${p.stock}</td>
       
        <td><span class="badge ${p.status==='aktif'?'badge-green':p.status==='stok menipis'?'badge-gold':'badge-red'}">${p.status}</span></td>
        <td><div style="display:flex;gap:.4rem">
          <button class="btn btn-outline btn-sm" onclick="editProduct(${i})">✏️ Edit</button>
          <button class="btn btn-red btn-sm" onclick="deleteProduct(this)">🗑️</button>
        </div></td>
      </tr>`).join('')}</tbody></table>`;
  }
}

function editProduct(i) {
  const p = allProducts[i];
  document.getElementById('modal-title').textContent = 'Edit Produk';
  document.getElementById('f-name').value = p.name;
  document.getElementById('f-price').value = p.price.replace(/\D/g,'');
  document.getElementById('f-stock').value = p.stock;
  openModal();
}

function deleteProduct(btn) {
  if(confirm('Hapus produk ini?')) btn.closest('.prod-card, tr').remove();
}

function openModal() { document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function saveProduct() {
  alert('Produk berhasil disimpan!');
  closeModal();
}

renderProducts();

const obs = new IntersectionObserver(entries => {
  entries.forEach((e,i) => { if(e.isIntersecting){ setTimeout(()=>e.target.classList.add('visible'),i*80); obs.unobserve(e.target); } });
}, {threshold:.1});
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>
</body>
</html>
