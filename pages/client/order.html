<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pesan Produk — PanenKu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --cream:#F7F2E8; --cream2:#EDE4CF; --brown:#5C3D1E; --brown2:#8B6340;
  --brown3:#C4956A; --green:#4A7C3F; --green2:#6FA05E; --green3:#C9DFB5;
  --gold:#C8962A; --gold2:#F0C55A; --text:#2C1F0E; --muted:#7A6040;
  --red:#C0392B; --red2:#FDECEA; --blue:#2471A3; --blue2:#D6EAF8;
  --nav-w:240px; --header-h:64px; --border:rgba(92,61,30,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden;}

/* SIDEBAR */
.sidebar{width:var(--nav-w);min-height:100vh;background:var(--brown);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200;}
.sidebar-logo{padding:1.4rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-logo a{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:#fff;text-decoration:none;display:flex;align-items:center;gap:.4rem;}
.sidebar-logo span{color:var(--gold2);}
.sidebar-role{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:.9rem 1.25rem .4rem;}
.sidebar-nav{flex:1;padding:.5rem 0;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.68rem 1.25rem;text-decoration:none;color:rgba(255,255,255,.65);font-size:.88rem;font-weight:500;transition:all .2s;margin:.1rem .75rem;border-radius:10px;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;}
.nav-item.active::before{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--gold2);border-radius:99px;}
.nav-icon{font-size:1.05rem;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;padding:.15rem .45rem;border-radius:999px;}
.sidebar-divider{height:1px;background:rgba(255,255,255,.08);margin:.5rem 1rem;}
.sidebar-footer{padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,.08);}
.user-profile{display:flex;align-items:center;gap:.75rem;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.user-name{font-size:.82rem;font-weight:600;color:#fff;}
.user-email{font-size:.7rem;color:rgba(255,255,255,.45);}
.btn-logout{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;font-size:1rem;transition:color .2s;}
.btn-logout:hover{color:var(--red);}

/* MAIN */
.main{margin-left:var(--nav-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}

/* TOPBAR */
.topbar{height:var(--header-h);background:rgba(247,242,232,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:100;}
.page-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--text);}
.breadcrumb{font-size:.78rem;color:var(--muted);}
.topbar-right{display:flex;align-items:center;gap:.75rem;}
.topbar-btn{width:36px;height:36px;border-radius:10px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .2s;position:relative;text-decoration:none;}
.topbar-btn:hover{background:var(--cream2);}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red);border:1.5px solid var(--cream);}

/* PAGE */
.page-content{padding:1.75rem 2rem;flex:1;}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;margin-bottom:1.75rem;}
.stat-card{background:#fff;border-radius:16px;padding:1.25rem 1.5rem;border:1px solid var(--border);display:flex;align-items:flex-start;gap:1rem;transition:transform .2s,box-shadow .2s;}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(92,61,30,.1);}
.stat-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.stat-value{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--text);line-height:1;}
.stat-label{font-size:.78rem;color:var(--muted);margin-top:.25rem;}
.stat-change{font-size:.75rem;margin-top:.4rem;}
.stat-change.up{color:var(--green);}
.stat-change.down{color:var(--red);}

/* TABLE */
.table-wrap{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden;}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.75rem;}
.table-title{font-weight:600;font-size:.95rem;color:var(--text);}
.search-box{display:flex;align-items:center;gap:.5rem;background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:.45rem .85rem;}
.search-box input{border:none;background:transparent;outline:none;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);width:180px;}
.search-box input::placeholder{color:var(--muted);}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--cream);}
th{padding:.75rem 1.25rem;text-align:left;font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
td{padding:.85rem 1.25rem;border-top:1px solid var(--border);font-size:.875rem;color:var(--text);vertical-align:middle;}
tr:hover td{background:rgba(247,242,232,.6);}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:999px;font-size:.72rem;font-weight:600;}
.badge-green{background:#EAF6EA;color:var(--green);}
.badge-gold{background:#FEF9E7;color:var(--gold);}
.badge-red{background:var(--red2);color:var(--red);}
.badge-blue{background:var(--blue2);color:var(--blue);}
.badge-gray{background:var(--cream2);color:var(--muted);}
.badge-brown{background:#F5EDE0;color:var(--brown);}

/* BUTTONS */
.btn{padding:.5rem 1.1rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.845rem;font-weight:500;cursor:pointer;transition:all .2s;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;}
.btn-primary{background:var(--brown);color:#fff;}
.btn-primary:hover{background:var(--green);transform:translateY(-1px);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:var(--brown);}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-outline:hover{background:var(--cream2);border-color:var(--brown2);}
.btn-red{background:var(--red2);color:var(--red);}
.btn-red:hover{background:var(--red);color:#fff;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-gold:hover{background:var(--brown);}
.btn-sm{padding:.35rem .75rem;font-size:.78rem;border-radius:8px;}
.btn-block{width:100%;justify-content:center;}
.btn-lg{padding:.8rem 1.8rem;font-size:.95rem;}

/* CARD */
.card{background:#fff;border-radius:16px;padding:1.5rem;border:1px solid var(--border);}
.section-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:1rem;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(44,31,14,.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal{background:#fff;border-radius:20px;width:90%;max-width:520px;padding:2rem;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;}
.modal-overlay.show .modal{transform:none;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--muted);}
.modal-close:hover{color:var(--red);}
.modal-footer{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);}
.form-field{margin-bottom:1rem;}
.form-field label{display:block;font-size:.8rem;font-weight:500;color:var(--brown);margin-bottom:.4rem;}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:.65rem .9rem;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.875rem;color:var(--text);background:#fff;outline:none;transition:border-color .2s;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--green);}
.form-field textarea{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;}

/* PAGINATION */
.pagination{display:flex;align-items:center;gap:.5rem;padding:1rem 1.5rem;border-top:1px solid var(--border);}
.pg-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.82rem;color:var(--text);transition:all .2s;}
.pg-btn:hover,.pg-btn.active{background:var(--brown);color:#fff;border-color:var(--brown);}
.pg-info{font-size:.78rem;color:var(--muted);margin-left:auto;}

/* FILTER */
.filter-bar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.filter-btn{padding:.4rem .9rem;border-radius:999px;border:1.5px solid var(--border);background:#fff;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{background:var(--brown);color:#fff;border-color:var(--brown);}

/* MISC */
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:600;flex-shrink:0;}
.divider{height:1px;background:var(--border);margin:1.25rem 0;}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-state .es-icon{font-size:3rem;margin-bottom:.75rem;}
.reveal{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease;}
.reveal.visible{opacity:1;transform:none;}

.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;}
.prod-card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:transform .2s,box-shadow .2s;cursor:pointer;}
.prod-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(92,61,30,.12);}
.prod-thumb{height:130px;display:flex;align-items:center;justify-content:center;font-size:4rem;position:relative;}
.prod-badge-abs{position:absolute;top:10px;left:10px;font-size:.68rem;font-weight:700;padding:.2rem .6rem;border-radius:999px;}
.prod-body{padding:1rem 1.1rem;}
.prod-cat{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green2);margin-bottom:.2rem;}
.prod-name{font-weight:600;font-size:.9rem;margin-bottom:.15rem;}
.prod-footer{display:flex;align-items:center;justify-content:space-between;}
.prod-price{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--brown);}
.prod-unit{font-size:.7rem;color:var(--muted);}
.qty-ctrl{display:flex;align-items:center;gap:.4rem;}
.qty-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.qty-btn:hover{background:var(--brown);color:#fff;}
.qty-val{font-weight:600;font-size:.88rem;min-width:20px;text-align:center;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><a href="../../../index.html">🌾 Panen<span>Ku</span></a></div>
  <div class="sidebar-role">Akun Pembeli</div>
  <nav class="sidebar-nav"><a href="dashboard.html" class="nav-item "><span class="nav-icon">🏠</span> Dashboard</a>
<a href="order.html" class="nav-item active"><span class="nav-icon">🌾</span> Pesan Produk</a>
<a href="cart.html" class="nav-item "><span class="nav-icon">🛒</span> Keranjang <span class="nav-badge" id="cart-count">0</span></a>
<a href="history.html" class="nav-item "><span class="nav-icon">📦</span> Riwayat Pesanan</a>
<a href="tracking.html" class="nav-item "><span class="nav-icon">🚚</span> Lacak Pengiriman</a>
<div class="sidebar-divider"></div>
<a href="profile.html" class="nav-item "><span class="nav-icon">👤</span> Profil</a>
</nav>
  <div class="sidebar-footer">
    <div class="user-profile">
      <div class="user-avatar">👩</div>
      <div><div class="user-name">Ibu Ratna</div><div class="user-email">ratna@email.com</div></div>
      <button class="btn-logout" onclick="window.location.href='../../auth/login.html'">🚪</button>
    </div>
  </div>
</aside>
<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title">Pesan Produk</div>
      <div class="breadcrumb">Pilih bahan pokok favoritmu</div>
    </div>
    <div class="topbar-right">
      <a href="cart.html" class="topbar-btn" title="Keranjang">🛒<div class="notif-dot"></div></a>
      <div class="topbar-btn" title="Notifikasi">🔔</div>
    </div>
  </div>
  <div class="page-content">

<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem" class="reveal">
  <div class="filter-bar" style="margin:0" id="kat-filter">
    <button class="filter-btn active" onclick="filterKat('semua',this)">Semua</button>
    <button class="filter-btn" onclick="filterKat('Beras Putih',this)">🍚 Beras Putih</button>
    <button class="filter-btn" onclick="filterKat('Beras Ketan',this)">🌾 Beras Ketan</button>
    <button class="filter-btn" onclick="filterKat('Ubi Jalar',this)">🍠 Ubi Jalar</button>
    <button class="filter-btn" onclick="filterKat('Ubi Kayu',this)">🟤 Ubi Kayu</button>
    <button class="filter-btn" onclick="filterKat('Beras Merah',this)">🌿 Beras Merah</button>
  </div>
  <div class="search-box"><span>🔍</span><input id="search-prod" placeholder="Cari produk..." oninput="renderProds()"/></div>
</div>
<div id="prod-grid" class="prod-grid reveal"></div>
<!-- Float cart btn -->
<a href="cart.html" id="float-cart" style="position:fixed;bottom:2rem;right:2rem;background:var(--brown);color:#fff;border-radius:999px;padding:.75rem 1.5rem;display:flex;align-items:center;gap:.6rem;font-weight:600;text-decoration:none;box-shadow:0 8px 24px rgba(92,61,30,.3);transition:all .2s;z-index:50">
  🛒 Keranjang (<span id="float-count">0</span>)
</a>

  </div>
</div>
<script>
const products = [
  {emoji:'🍚',badge:'Terlaris',cat:'Beras Putih',name:'Beras Pandan Wangi',price:'Rp 65.000',unit:'/5 kg',bg:'#FFF8E8',id:1},
  {emoji:'🌾',badge:'Baru',cat:'Beras Ketan',name:'Beras Ketan Putih',price:'Rp 28.000',unit:'/kg',bg:'#F0F8E8',id:2},
  {emoji:'🍠',badge:'',cat:'Ubi Jalar',name:'Ubi Jalar Merah',price:'Rp 8.000',unit:'/kg',bg:'#FFF0E8',id:3},
  {emoji:'🌿',badge:'',cat:'Beras Merah',name:'Beras Merah Organik',price:'Rp 22.000',unit:'/kg',bg:'#F0F5E8',id:4},
  {emoji:'🟤',badge:'Promo',cat:'Ubi Kayu',name:'Singkong Segar',price:'Rp 5.000',unit:'/kg',bg:'#F5EDE0',id:5},
  {emoji:'🍚',badge:'',cat:'Beras Ketan',name:'Beras Ketan Hitam',price:'Rp 32.000',unit:'/kg',bg:'#F0EEF8',id:6},
  {emoji:'🍚',badge:'',cat:'Beras Putih',name:'Beras IR 64',price:'Rp 55.000',unit:'/5 kg',bg:'#FFF8E8',id:7},
  {emoji:'🍠',badge:'',cat:'Ubi Jalar',name:'Ubi Jalar Ungu',price:'Rp 9.000',unit:'/kg',bg:'#F5E8FF',id:8},
  {emoji:'🌾',badge:'',cat:'Beras Putih',name:'Beras Pera Lokal',price:'Rp 48.000',unit:'/5 kg',bg:'#FFF8E8',id:9},
];

let cart = JSON.parse(localStorage.getItem('panenku_cart')||'[]');
let currentKat = 'semua';

function getQty(id){ const i=cart.find(c=>c.id===id); return i?i.qty:0; }
function updateCart(id,name,delta){
  let i=cart.findIndex(c=>c.id===id);
  if(i===-1&&delta>0){cart.push({id,name,qty:delta});}
  else if(i!==-1){cart[i].qty+=delta; if(cart[i].qty<=0)cart.splice(i,1);}
  localStorage.setItem('panenku_cart',JSON.stringify(cart));
  document.getElementById('float-count').textContent=cart.reduce((s,i)=>s+i.qty,0);
  renderProds();
}

function filterKat(kat,btn){
  currentKat=kat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProds();
}

function renderProds(){
  const q=document.getElementById('search-prod').value.toLowerCase();
  const filtered=products.filter(p=>(currentKat==='semua'||p.cat===currentKat)&&p.name.toLowerCase().includes(q));
  const grid=document.getElementById('prod-grid');
  grid.innerHTML=filtered.map(p=>{
    const qty=getQty(p.id);
    return `<div class="prod-card">
      <div class="prod-thumb" style="background:${p.bg}">${p.emoji}${p.badge?`<span class="prod-badge-abs badge-gold">${p.badge}</span>`:''}</div>
      <div class="prod-body">
        <div class="prod-cat">${p.cat}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-footer">
          <div><div class="prod-price">${p.price}</div><div class="prod-unit">${p.unit}</div></div>
          ${qty===0
            ? `<button class="btn btn-primary btn-sm" onclick="updateCart(${p.id},'${p.name}',1)">+ Tambah</button>`
            : `<div class="qty-ctrl"><button class="qty-btn" onclick="updateCart(${p.id},'${p.name}',-1)">−</button><span class="qty-val">${qty}</span><button class="qty-btn" onclick="updateCart(${p.id},'${p.name}',1)">+</button></div>`
          }
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('float-count').textContent=cart.reduce((s,i)=>s+i.qty,0);
renderProds();
const obs=new IntersectionObserver(entries=>{entries.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('visible'),i*60);obs.unobserve(e.target);}});},{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
