<script type="module">
    import { getProducts } from "../../assets/js/api.js";

    async function loadProducts() {
        const products = await getProducts();

        const container = document.getElementById("products");

        products.forEach(product => {
            container.innerHTML += `
                <div>
                    <h3>${product.name}</h3>
                    <p>Rp ${product.price}</p>
                </div>
            `;
        });
    }

    loadProducts();
</script>
