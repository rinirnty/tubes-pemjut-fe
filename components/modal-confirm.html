<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{--cream:#F7F2E8;--cream2:#EDE4CF;--brown:#5C3D1E;--brown2:#8B6340;--brown3:#C4956A;--green:#4A7C3F;--green2:#6FA05E;--green3:#C9DFB5;--gold:#C8962A;--gold2:#F0C55A;--text:#2C1F0E;--muted:#7A6040;--red:#C0392B;--red2:#FDECEA;--blue:#2471A3;--blue2:#D6EAF8;--border:rgba(92,61,30,.12);--sidebar-w:240px;--header-h:64px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
.btn{padding:.55rem 1.3rem;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;}
.btn-primary{background:var(--brown);color:#fff;}.btn-primary:hover{background:var(--green);transform:translateY(-1px);}
.btn-outline{background:transparent;border:1.5px solid var(--brown2);color:var(--brown);}.btn-outline:hover{background:var(--brown2);color:#fff;}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:var(--brown);}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{background:var(--brown);}
.btn-white{background:#fff;color:var(--brown);}.btn-white:hover{background:var(--cream2);}
.btn-red{background:var(--red2);color:var(--red);}.btn-red:hover{background:var(--red);color:#fff;}
.btn-sm{padding:.35rem .75rem;font-size:.78rem;border-radius:8px;}
.btn-lg{padding:.85rem 2rem;font-size:1rem;}
.btn-block{width:100%;justify-content:center;border-radius:12px;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:8px;justify-content:center;}
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:999px;font-size:.72rem;font-weight:600;}
.badge-green{background:#EAF6EA;color:var(--green);}
.badge-gold{background:#FEF9E7;color:var(--gold);}
.badge-red{background:var(--red2);color:var(--red);}
.badge-blue{background:var(--blue2);color:var(--blue);}
.badge-gray{background:var(--cream2);color:var(--muted);}
.badge-brown{background:#F5EDE0;color:var(--brown);}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .6s ease,transform .6s ease;}
.reveal.visible{opacity:1;transform:none;}
</style>

<style>
.modal-overlay{position:fixed;inset:0;background:rgba(44,31,14,.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal{background:#fff;border-radius:20px;width:90%;max-width:520px;padding:2rem;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s;}
.modal-overlay.show .modal{transform:none;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--text);}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--muted);transition:color .2s;}
.modal-close:hover{color:var(--red);}
.modal-footer{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);}
</style>

<div class="modal-overlay" id="confirm-modal" onclick="if(event.target===this)closeConfirmModal()">
  <div class="modal" style="max-width:400px;text-align:center">
    <div style="font-size:3rem;margin-bottom:1rem" id="confirm-icon">⚠️</div>
    <div class="modal-title" id="confirm-title" style="margin-bottom:.6rem">Konfirmasi</div>
    <p id="confirm-message" style="font-size:.875rem;color:var(--muted);line-height:1.7;margin-bottom:1.5rem">Apakah kamu yakin?</p>
    <div style="display:flex;gap:.75rem;justify-content:center">
      <button class="btn btn-outline" id="confirm-cancel" onclick="closeConfirmModal()">Batal</button>
      <button class="btn btn-primary" id="confirm-ok">Ya, Lanjutkan</button>
    </div>
  </div>
</div>

<script>
function showConfirmModal({title='Konfirmasi',message='Apakah kamu yakin?',confirmText='Ya, Lanjutkan',cancelText='Batal',icon='⚠️',type='warning',onConfirm=()=>{}}={}){
  const colors={warning:'#5C3D1E',danger:'#C0392B',success:'#4A7C3F',info:'#2471A3'};
  document.getElementById('confirm-icon').textContent=icon;
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-message').textContent=message;
  document.getElementById('confirm-cancel').textContent=cancelText;
  const okBtn=document.getElementById('confirm-ok');
  okBtn.textContent=confirmText;
  okBtn.style.background=type==='danger'?'#C0392B':type==='success'?'#4A7C3F':type==='info'?'#2471A3':'#5C3D1E';
  okBtn.onclick=()=>{closeConfirmModal();onConfirm();};
  document.getElementById('confirm-modal').classList.add('show');
}
function closeConfirmModal(){
  document.getElementById('confirm-modal').classList.remove('show');
}
</script>
