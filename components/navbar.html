<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{--cream:#F7F2E8;--cream2:#EDE4CF;--brown:#5C3D1E;--brown2:#8B6340;--brown3:#C4956A;--green:#4A7C3F;--green2:#6FA05E;--green3:#C9DFB5;--gold:#C8962A;--gold2:#F0C55A;--text:#2C1F0E;--muted:#7A6040;--red:#C0392B;--red2:#FDECEA;--blue:#2471A3;--blue2:#D6EAF8;--border:rgba(92,61,30,.12);--sidebar-w:240px;--header-h:64px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
.btn{padding:.55rem 1.3rem;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;}
.btn-primary{background:var(--brown);color:#fff;}.btn-primary:hover{background:var(--green);transform:translateY(-1px);}
.btn-outline{background:transparent;border:1.5px solid var(--brown2);color:var(--brown);}.btn-outline:hover{background:var(--brown2);color:#fff;}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:var(--brown);}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{background:var(--brown);}
.btn-white{background:#fff;color:var(--brown);}.btn-white:hover{background:var(--cream2);}
.btn-red{background:var(--red2);color:var(--red);}.btn-red:hover{background:var(--red);color:#fff;}
.btn-sm{padding:.35rem .75rem;font-size:.78rem;border-radius:8px;}
.btn-lg{padding:.85rem 2rem;font-size:1rem;}
.btn-block{width:100%;justify-content:center;border-radius:12px;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:8px;justify-content:center;}
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:999px;font-size:.72rem;font-weight:600;}
.badge-green{background:#EAF6EA;color:var(--green);}
.badge-gold{background:#FEF9E7;color:var(--gold);}
.badge-red{background:var(--red2);color:var(--red);}
.badge-blue{background:var(--blue2);color:var(--blue);}
.badge-gray{background:var(--cream2);color:var(--muted);}
.badge-brown{background:#F5EDE0;color:var(--brown);}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .6s ease,transform .6s ease;}
.reveal.visible{opacity:1;transform:none;}
</style>

<style>
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 5%;background:rgba(247,242,232,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);transition:box-shadow .3s;}
nav.scrolled{box-shadow:0 4px 24px rgba(92,61,30,.1);}
.logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--brown);display:flex;align-items:center;gap:.45rem;text-decoration:none;}
.logo span{color:var(--green);}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{text-decoration:none;color:var(--muted);font-size:.88rem;font-weight:500;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--brown);}
.nav-cta{display:flex;gap:.75rem;}
@media(max-width:768px){.nav-links{display:none;}}
</style>

<nav id="navbar">
  <a href="/index.html" class="logo">🌾 Panen<span>Ku</span></a>
  <ul class="nav-links">
    <li><a href="/index.html#produk">Produk</a></li>
    <li><a href="/pages/public/catalog.html">Katalog</a></li>
    <li><a href="/index.html#cara-kerja">Cara Kerja</a></li>
    <li><a href="/pages/public/about.html">Tentang</a></li>
    <li><a href="/pages/public/contact.html">Kontak</a></li>
  </ul>
  <div class="nav-cta">
    <a href="/pages/auth/login.html" class="btn btn-outline" id="nav-login">Masuk</a>
    <a href="/pages/auth/register.html" class="btn btn-primary" id="nav-register">Daftar Gratis</a>
  </div>
</nav>

<script>
(function(){
  window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>30));
  const token=localStorage.getItem('panenku_token');
  const role=localStorage.getItem('panenku_role');
  if(!token)return;
  const routes={pembeli:'/pages/client/dashboard.html',admin:'/pages/admin/dashboard.html'};
  const loginBtn=document.getElementById('nav-login');
  const regBtn=document.getElementById('nav-register');
  if(loginBtn){loginBtn.textContent='Dashboard';loginBtn.href=routes[role]||'#';}
  if(regBtn)regBtn.style.display='none';
})();
</script>
