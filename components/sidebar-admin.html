<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{--cream:#F7F2E8;--cream2:#EDE4CF;--brown:#5C3D1E;--brown2:#8B6340;--brown3:#C4956A;--green:#4A7C3F;--green2:#6FA05E;--green3:#C9DFB5;--gold:#C8962A;--gold2:#F0C55A;--text:#2C1F0E;--muted:#7A6040;--red:#C0392B;--red2:#FDECEA;--blue:#2471A3;--blue2:#D6EAF8;--border:rgba(92,61,30,.12);--sidebar-w:240px;--header-h:64px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
.btn{padding:.55rem 1.3rem;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;}
.btn-primary{background:var(--brown);color:#fff;}.btn-primary:hover{background:var(--green);transform:translateY(-1px);}
.btn-outline{background:transparent;border:1.5px solid var(--brown2);color:var(--brown);}.btn-outline:hover{background:var(--brown2);color:#fff;}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:var(--brown);}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{background:var(--brown);}
.btn-white{background:#fff;color:var(--brown);}.btn-white:hover{background:var(--cream2);}
.btn-red{background:var(--red2);color:var(--red);}.btn-red:hover{background:var(--red);color:#fff;}
.btn-sm{padding:.35rem .75rem;font-size:.78rem;border-radius:8px;}
.btn-lg{padding:.85rem 2rem;font-size:1rem;}
.btn-block{width:100%;justify-content:center;border-radius:12px;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:8px;justify-content:center;}
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:999px;font-size:.72rem;font-weight:600;}
.badge-green{background:#EAF6EA;color:var(--green);}
.badge-gold{background:#FEF9E7;color:var(--gold);}
.badge-red{background:var(--red2);color:var(--red);}
.badge-blue{background:var(--blue2);color:var(--blue);}
.badge-gray{background:var(--cream2);color:var(--muted);}
.badge-brown{background:#F5EDE0;color:var(--brown);}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .6s ease,transform .6s ease;}
.reveal.visible{opacity:1;transform:none;}
</style>

<style>
.sidebar{width:240px;min-height:100vh;background:var(--brown);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200;transition:transform .3s;}
.sidebar-logo{padding:1.4rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-logo a{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:#fff;text-decoration:none;display:flex;align-items:center;gap:.4rem;}
.sidebar-logo span{color:var(--gold2);}
.sidebar-role{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:.9rem 1.25rem .4rem;}
.sidebar-nav{flex:1;padding:.5rem 0;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.68rem 1.25rem;text-decoration:none;color:rgba(255,255,255,.65);font-size:.88rem;font-weight:500;transition:all .2s;margin:.1rem .75rem;border-radius:10px;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;}
.nav-item.active::before{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--gold2);border-radius:99px;}
.nav-icon{font-size:1.05rem;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;padding:.15rem .45rem;border-radius:999px;}
.sidebar-divider{height:1px;background:rgba(255,255,255,.08);margin:.5rem 1rem;}
.sidebar-footer{padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,.08);}
.admin-profile{display:flex;align-items:center;gap:.75rem;}
.admin-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.admin-name{font-size:.82rem;font-weight:600;color:#fff;}
.admin-email{font-size:.7rem;color:rgba(255,255,255,.45);}
.btn-logout{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;font-size:1rem;transition:color .2s;}
.btn-logout:hover{color:var(--red);}
</style>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="/index.html">🌾 Panen<span>Ku</span></a>
  </div>
  <div class="sidebar-role">Admin Panel</div>
  <nav class="sidebar-nav">
    <a href="/pages/admin/dashboard.html" class="nav-item" data-page="dashboard">
      <span class="nav-icon">📊</span> Dashboard
    </a>
    <a href="/pages/admin/products.html" class="nav-item" data-page="products">
      <span class="nav-icon">🌾</span> Produk
    </a>
    <a href="/pages/admin/orders.html" class="nav-item" data-page="orders">
      <span class="nav-icon">📦</span> Pesanan
      <span class="nav-badge" id="pending-count">0</span>
    </a>
    <a href="/pages/admin/clients.html" class="nav-item" data-page="clients">
      <span class="nav-icon">👥</span> Pengguna
    </a>
    <a href="/pages/admin/reports.html" class="nav-item" data-page="reports">
      <span class="nav-icon">📈</span> Laporan
    </a>
    <div class="sidebar-divider"></div>
    <a href="#" class="nav-item" data-page="settings">
      <span class="nav-icon">⚙️</span> Pengaturan
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-profile">
      <div class="admin-avatar">👨‍💼</div>
      <div>
        <div class="admin-name" id="sidebar-name">Admin</div>
        <div class="admin-email" id="sidebar-email">admin@panenku.com</div>
      </div>
      <button class="btn-logout" id="btn-logout" title="Logout">🚪</button>
    </div>
  </div>
</aside>

<script>
(function(){
  const page=document.body.dataset.page;
  document.querySelectorAll('.sidebar .nav-item[data-page]').forEach(a=>{
    if(a.dataset.page===page)a.classList.add('active');
  });
  const user=JSON.parse(localStorage.getItem('panenku_user')||'{}');
  const nameEl=document.getElementById('sidebar-name');
  const emailEl=document.getElementById('sidebar-email');
  if(nameEl&&user.name)nameEl.textContent=user.name;
  if(emailEl&&user.email)emailEl.textContent=user.email;
  document.getElementById('btn-logout')?.addEventListener('click',()=>{
    if(confirm('Yakin ingin keluar?')){localStorage.clear();window.location.href='/pages/auth/login.html';}
  });
})();
</script>
